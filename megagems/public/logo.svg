<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Main gem shape -->
  <polygon points="50,5 85,30 75,90 25,90 15,30" fill="url(#gemGradient)" stroke="#6d28d9" stroke-width="2"/>
  <!-- Top facet -->
  <polygon points="50,5 85,30 50,40 15,30" fill="url(#shine)" opacity="0.6"/>
  <!-- Left facet -->
  <polygon points="15,30 50,40 25,90" fill="#9333ea" opacity="0.4"/>
  <!-- Right facet -->
  <polygon points="85,30 50,40 75,90" fill="#7c3aed" opacity="0.4"/>
  <!-- Center facet -->
  <polygon points="50,40 75,90 25,90" fill="#8b5cf6" opacity="0.3"/>
  <!-- Sparkle -->
  <circle cx="35" cy="25" r="3" fill="white" opacity="0.8"/>
</svg>
